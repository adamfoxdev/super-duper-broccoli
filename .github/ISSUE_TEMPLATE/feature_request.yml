name: Feature Request
description: Request a new feature or enhancement
title: "[Feature]: "
labels:
  - feature-request
  - intake
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thank you for requesting a feature. Complete all sections so that the team
        can triage, plan, and implement your request with confidence.

  # ── Business Context ────────────────────────────────────────────────────────
  - type: textarea
    id: problem-statement
    attributes:
      label: Problem Statement
      description: >
        What problem does this feature solve? Who is affected and what is the
        current pain point?
      placeholder: "As a [persona], I am unable to [do X] because [Y], which causes [impact]."
    validations:
      required: true

  - type: textarea
    id: proposed-solution
    attributes:
      label: Proposed Solution
      description: >
        Describe the desired behaviour or feature at a high level.
        Do not prescribe implementation details unless they are important constraints.
      placeholder: "I would like the system to [do X] so that [outcome]."
    validations:
      required: true

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance Criteria
      description: >
        List testable conditions that must all be true for this feature to be
        considered done. Use "Given / When / Then" format where helpful.
      placeholder: |
        - [ ] Given … when … then …
        - [ ] Given … when … then …
    validations:
      required: true

  # ── Priority & Impact ───────────────────────────────────────────────────────
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: How urgently is this feature needed?
      options:
        - Critical — blocking a key business process
        - High — significant impact, needed this quarter
        - Medium — valuable but can wait one quarter
        - Low — nice-to-have
    validations:
      required: true

  - type: dropdown
    id: affected-users
    attributes:
      label: Affected Users / Stakeholders
      description: Who benefits from this feature?
      options:
        - End users / customers
        - Internal team
        - Both
        - Other
    validations:
      required: true

  # ── Supporting Information ──────────────────────────────────────────────────
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: >
        Have you considered alternative solutions or workarounds?
        Why is the proposed solution preferable?

  - type: textarea
    id: designs-references
    attributes:
      label: Designs / References
      description: >
        Attach mockups, diagrams, specification documents, or links to relevant
        external resources.

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: >
        Any other information the team should know (dependencies, regulatory
        constraints, deadlines, related work items, etc.).
