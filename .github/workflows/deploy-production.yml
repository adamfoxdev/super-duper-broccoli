# Deploy to Production
#
# Can be triggered in two ways:
#   1. Manually via workflow_dispatch (recommended for on-demand releases).
#   2. Automatically when the UAT smoke-test workflow completes successfully
#      (uncomment the `workflow_run` trigger below to enable this).
#
# Human quality gates:
#   • The `production` GitHub Environment must be configured with required
#     reviewers.  A human sign-off is required before the deploy job runs.
#     Configure at: Settings → Environments → production → Required reviewers
#   • A minimum wait timer can also be set on the environment to enforce a
#     mandatory soak period after UAT before production is unlocked.

name: Deploy to Production

on:
  workflow_dispatch:
    inputs:
      sha:
        description: "Commit SHA to deploy (defaults to HEAD of main)"
        required: false
        default: ""
      release_notes:
        description: "Brief release notes / change summary"
        required: true

  # Uncomment to trigger automatically after a successful UAT deployment:
  # workflow_run:
  #   workflows: ["Deploy to UAT"]
  #   types:
  #     - completed
  #   branches:
  #     - main

permissions:
  contents: write   # needed to create a GitHub Release
  deployments: write

jobs:
  # ─── Resolve the target SHA ───────────────────────────────────────────────────
  resolve:
    name: Resolve target SHA
    runs-on: ubuntu-latest
    outputs:
      deploy-sha: ${{ steps.resolve.outputs.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve SHA
        id: resolve
        run: |
          SHA="${{ github.event.inputs.sha }}"
          if [ -z "$SHA" ]; then
            SHA=$(git rev-parse HEAD)
          fi
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "Deploying SHA: $SHA"

  # ─── Pre-production validation ────────────────────────────────────────────────
  pre-prod-check:
    name: Pre-production validation
    needs: resolve
    runs-on: ubuntu-latest
    steps:
      - name: Checkout at target SHA
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve.outputs.deploy-sha }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run full test suite
        run: npm test
        # This reruns tests against the exact SHA being deployed to production,
        # providing a final automated quality gate.

  # ─── Deploy (waits for human approval via Environment protection) ─────────────
  deploy:
    name: Deploy to Production
    needs:
      - resolve
      - pre-prod-check
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ vars.PRODUCTION_URL }}
      # PRODUCTION_URL should be set as an Environment variable in the
      # `production` Environment.
    steps:
      - name: Checkout at target SHA
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve.outputs.deploy-sha }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build release artifact
        run: npm run build

      - name: Deploy to production
        run: |
          echo "Deploying ${{ needs.resolve.outputs.deploy-sha }} to production..."
          # Replace the line below with the real deployment command, e.g.:
          #   az webapp deploy --name my-app-prod ...
          #   kubectl apply -f k8s/production/ ...
          #   ./scripts/deploy.sh production dist/
          echo "Deployment step — replace this with your actual deploy command."
        env:
          DEPLOY_TOKEN: ${{ secrets.PROD_DEPLOY_TOKEN }}

  # ─── Post-deployment smoke tests ─────────────────────────────────────────────
  smoke-test:
    name: Production Smoke Tests
    needs:
      - resolve
      - deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve.outputs.deploy-sha }}

      - name: Run smoke tests against production
        run: |
          echo "Running smoke tests against ${{ vars.PRODUCTION_URL }}..."
          # Replace with the real smoke-test command, e.g.:
          #   npm run test:smoke -- --base-url "$PRODUCTION_URL"
          echo "Smoke test step — replace this with your actual smoke-test command."
        env:
          PRODUCTION_URL: ${{ vars.PRODUCTION_URL }}

  # ─── Create GitHub Release ───────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs:
      - resolve
      - smoke-test
    runs-on: ubuntu-latest
    if: success()
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve.outputs.deploy-sha }}

      - name: Create release tag
        run: |
          TAG="release-$(date +'%Y%m%d%H%M%S')"
          git tag "$TAG"
          git push origin "$TAG"
          echo "TAG=$TAG" >> "$GITHUB_ENV"

      - name: Publish GitHub Release
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: process.env.TAG,
              target_commitish: '${{ needs.resolve.outputs.deploy-sha }}',
              name: `Production Release ${process.env.TAG}`,
              body: `${{ github.event.inputs.release_notes || 'Automated production release.' }}\n\nDeployed SHA: ${{ needs.resolve.outputs.deploy-sha }}`,
              draft: false,
              prerelease: false,
            });

  # ─── Notify stakeholders ─────────────────────────────────────────────────────
  notify:
    name: Notify stakeholders
    needs:
      - resolve
      - smoke-test
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Post production deployment result
        run: |
          STATUS="${{ needs.smoke-test.result }}"
          SHA="${{ needs.resolve.outputs.deploy-sha }}"
          echo "Production deployment of $SHA finished with status: $STATUS"
          # Wire up your notification mechanism here, e.g.:
          #   - Post to Teams / Slack
          #   - Update the Azure DevOps work item to Done
          #   - Send a stakeholder email
          echo "Notification step — wire up your alerting tool here."

  # ─── Rollback (manual trigger only) ──────────────────────────────────────────
  # To roll back, re-run this workflow with an older SHA in the `sha` input,
  # or manually trigger the deployment pipeline for the previous release tag.
